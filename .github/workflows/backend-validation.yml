name: Backend Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  SA_PASSWORD: "XpayCI@2024!"
  DB_NAME: "XPAY_MVP"
  API_PORT: "5000"

jobs:
  validate-backend:
    name: Compile, Run & Test API
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          SA_PASSWORD: "XpayCI@2024!"
          MSSQL_PID: Developer
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'XpayCI@2024!' -Q 'SELECT 1' -b -C"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 15s

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Install sqlcmd (mssql-tools18)
        run: |
          sudo rm -f /usr/share/keyrings/microsoft-prod.gpg
          curl -sSfL https://packages.microsoft.com/keys/microsoft.asc \
            | sudo tee /etc/apt/trusted.gpg.d/microsoft-prod.asc > /dev/null
          echo "deb [arch=amd64] https://packages.microsoft.com/ubuntu/22.04/prod jammy main" \
            | sudo tee /etc/apt/sources.list.d/msprod.list > /dev/null
          sudo apt-get update -q
          sudo ACCEPT_EULA=Y apt-get install -y mssql-tools18 unixodbc-dev
          echo "/opt/mssql-tools18/bin" >> "$GITHUB_PATH"

      - name: Wait for SQL Server to accept connections
        run: |
          echo "Esperando a que SQL Server acepte conexiones..."
          for i in $(seq 1 30); do
            sqlcmd -S localhost,1433 -U sa -P "$SA_PASSWORD" \
              -Q "SELECT 1" -b -C 2>/dev/null && echo "SQL Server listo." && break
            echo "  intento $i/30 – reintentando en 5s..."
            sleep 5
          done
          sqlcmd -S localhost,1433 -U sa -P "$SA_PASSWORD" -Q "SELECT @@VERSION" -b -C

      - name: Crear base de datos y ejecutar migraciones
        run: |
          sqlcmd -S localhost,1433 -U sa -P "$SA_PASSWORD" -b -C \
            -Q "IF DB_ID('$DB_NAME') IS NULL CREATE DATABASE [$DB_NAME]; PRINT 'DB $DB_NAME lista.'"
          echo "--- Ejecutando 001_security_identity.sql ---"
          sqlcmd -S localhost,1433 -U sa -P "$SA_PASSWORD" -d "$DB_NAME" -b -C \
            -i database/001_security_identity.sql
          echo "--- Ejecutando 002_wallet_ledger.sql ---"
          sqlcmd -S localhost,1433 -U sa -P "$SA_PASSWORD" -d "$DB_NAME" -b -C \
            -i database/002_wallet_ledger.sql
          echo "--- Ejecutando 003_comercios_qr.sql ---"
          sqlcmd -S localhost,1433 -U sa -P "$SA_PASSWORD" -d "$DB_NAME" -b -C \
            -i database/003_comercios_qr.sql
          echo "--- Ejecutando 004_liquidacion_qr.sql ---"
          sqlcmd -S localhost,1433 -U sa -P "$SA_PASSWORD" -d "$DB_NAME" -b -C \
            -i database/004_liquidacion_qr.sql
          echo "--- Ejecutando 005_retiros_comercio.sql ---"
          sqlcmd -S localhost,1433 -U sa -P "$SA_PASSWORD" -d "$DB_NAME" -b -C \
            -i database/005_retiros_comercio.sql
          echo "--- Ejecutando 006_gestion_retiros_comercio.sql ---"
          sqlcmd -S localhost,1433 -U sa -P "$SA_PASSWORD" -d "$DB_NAME" -b -C \
            -i database/006_gestion_retiros_comercio.sql
          echo "Migraciones aplicadas."

      - name: dotnet restore
        run: dotnet restore backend/Xpay.Api/Xpay.Api.csproj

      - name: dotnet build
        run: |
          dotnet build backend/Xpay.Api/Xpay.Api.csproj \
            --no-restore \
            --configuration Release

      - name: Iniciar backend en background
        run: |
          dotnet run \
            --project backend/Xpay.Api/Xpay.Api.csproj \
            --no-build \
            --configuration Release \
            > /tmp/backend.log 2>&1 &
          echo "BACKEND_PID=$!" >> "$GITHUB_ENV"
        env:
          ConnectionStrings__XpayConnection: "Server=localhost,1433;Database=XPAY_MVP;User Id=sa;Password=XpayCI@2024!;TrustServerCertificate=True;"
          ASPNETCORE_URLS: "http://+:5000"
          ASPNETCORE_ENVIRONMENT: Development

      - name: Esperar a que el backend responda
        run: |
          echo "Esperando al backend en el puerto $API_PORT..."
          for i in $(seq 1 40); do
            curl -sf "http://localhost:$API_PORT/swagger/index.html" -o /dev/null \
              && echo "Backend listo." && break
            echo "  intento $i/40 – reintentando en 3s..."
            sleep 3
          done
          curl -sf "http://localhost:$API_PORT/swagger/index.html" -o /dev/null \
            || { echo "El backend no arrancó. Log:"; cat /tmp/backend.log; exit 1; }

      - name: Ejecutar validación de endpoints y base de datos
        run: bash scripts/validate-backend.sh
        env:
          API_URL: "http://localhost:5000"
          DB_HOST: "localhost,1433"
          DB_NAME: ${{ env.DB_NAME }}
          SA_PASSWORD: ${{ env.SA_PASSWORD }}

      - name: Imprimir log del backend (solo en fallo)
        if: failure()
        run: |
          echo "════ Log del backend ════"
          cat /tmp/backend.log || true
